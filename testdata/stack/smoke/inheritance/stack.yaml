apiVersion: torque.dev/v1
kind: Stack
name: smoke-inheritance

defaultProfile: dev

profiles:
  dev:
    defaults:
      values: [values-dev.yaml]

defaults:
  cluster:
    name: test-cluster
    kubeconfig: ~/.kube/config
  namespace: torque-stack-smoke
  values: [values-common.yaml]
  set:
    global.cluster: test-cluster
  tags: [root]

