apiVersion: torque.dev/v1
kind: Stack
name: smoke-basic

defaults:
  cluster:
    name: test-cluster
    kubeconfig: ~/.kube/config
  namespace: torque-stack-smoke
  apply:
    atomic: true
    wait: true
    timeout: 3m
  delete:
    timeout: 2m

releases:
  - name: cm-base
    chart: ./charts/cm-base
    tags: [smoke, base]

  - name: cm-dependent
    chart: ./charts/cm-dependent
    needs: [cm-base]
    tags: [smoke, dependent]

