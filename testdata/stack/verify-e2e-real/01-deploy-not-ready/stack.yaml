apiVersion: torque.dev/v1
kind: Stack
name: verify-01-deploy-not-ready
defaults:
  cluster: { name: test-cluster, kubeconfig: ~/.kube/config }
  namespace: torque-stack-verify-e2e
releases:
  # Real-world scenario: Helm wait is disabled for speed, but torque verify should still
  # catch that the Deployment never becomes healthy.
  - name: verify01-deploy
    chart: ./charts/deploy
    apply: { wait: false, atomic: false }
    verify:
      enabled: true
      failOnWarnings: true
      eventsWindow: 10m
    set:
      image: "example.invalid/does-not-exist:0"
