apiVersion: torque.dev/v1
kind: Stack
name: torque-stack-hooks-e2e

# Convenience stack wrapper for this chart directory.
# Lets you run:
#   torque stack --config ./testdata/charts/torque-stack-hooks-e2e apply ...
#
# This stack is intentionally minimal (no torque hooks); the chart itself contains
# Helm hooks in `templates/hooks.yaml`.

defaults:
  cluster:
    name: default
  namespace: torque-test

hooks:
  preApply:
    - name: stack-pre-apply-always
      type: script
      runOnce: true
      when: always
      timeout: 10s
      script:
        command: ["sh", "-c", "echo \"torque-stack-hooks-e2e pre-apply (always)\""]
  postApply:
    - name: stack-post-apply-success
      type: script
      runOnce: true
      when: success
      timeout: 10s
      script:
        command: ["sh", "-c", "echo \"torque-stack-hooks-e2e post-apply (success)\""]
    - name: stack-post-apply-failure
      type: script
      runOnce: true
      when: failure
      timeout: 10s
      script:
        command: ["sh", "-c", "echo \"torque-stack-hooks-e2e post-apply (failure)\""]
  preDelete:
    - name: stack-pre-delete-always
      type: script
      runOnce: true
      when: always
      timeout: 10s
      script:
        command: ["sh", "-c", "echo \"torque-stack-hooks-e2e pre-delete (always)\""]
  postDelete:
    - name: stack-post-delete-always
      type: script
      runOnce: true
      when: always
      timeout: 10s
      script:
        command: ["sh", "-c", "echo \"torque-stack-hooks-e2e post-delete (always)\""]

releases:
  - name: torque-stack-hooks-e2e
    chart: .
