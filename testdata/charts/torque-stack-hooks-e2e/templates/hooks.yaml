apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-hook-pre-install
  labels:
    torque.dev/e2e: "true"
    torque.dev/hook: pre-install
  annotations:
    helm.sh/hook: pre-install
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: hook
          image: busybox:1.36.1
          command: ["sh", "-c", "echo pre-install release={{ .Release.Name }} revision={{ .Release.Revision }}"]
---
