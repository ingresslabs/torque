apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "torque-guardian-incident-e2e.fullname" . }}
  labels:
    {{- include "torque-guardian-incident-e2e.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "torque-guardian-incident-e2e.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "torque-guardian-incident-e2e.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: broken
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          env:
            - name: API_TOKEN
              value: {{ .Values.env.token | quote }}
