name: Release artifacts

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: amd64
          - os: darwin
            arch: arm64
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25.9'
          cache: true

      - name: Install cosign
        uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0

      - name: Build binaries
        run: |
          set -euo pipefail
          commit="$(git rev-parse --short=12 HEAD)"
          source_date_epoch="$(git show -s --format=%ct HEAD)"
          build_date="$(date -u -d "@${source_date_epoch}" '+%Y-%m-%dT%H:%M:%SZ')"
          export SOURCE_DATE_EPOCH="${source_date_epoch}"
          ldflags="-s -w \
            -X github.com/ingresslabs/torque/internal/version.Version=${{ github.ref_name }} \
            -X github.com/ingresslabs/torque/internal/version.GitCommit=${commit} \
            -X github.com/ingresslabs/torque/internal/version.GitTreeState=clean \
            -X github.com/ingresslabs/torque/internal/version.BuildDate=${build_date}"
          mkdir -p dist
          for spec in torque:torque verifier:verifier verify:verify package:torque-package; do
            cmd="${spec%%:*}"
            tool="${spec##*:}"
            outdir="dist/${tool}-${{ matrix.os }}-${{ matrix.arch }}-${{ github.ref_name }}"
            mkdir -p "${outdir}"
            GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} CGO_ENABLED=0 \
              go build -trimpath -ldflags "${ldflags}" -o "${outdir}/${tool}" "./cmd/${cmd}"
            cat > "${outdir}/README.txt" <<TXT
          This archive contains a single binary built from https://github.com/${{ github.repository }}
          Install:
            chmod +x ./${tool} && mv ./${tool} /usr/local/bin/${tool}
          Check version:
            ${tool} --version
          TXT
            tarball="dist/${tool}-${{ matrix.os }}-${{ matrix.arch }}-${{ github.ref_name }}.tar.gz"
            # Reproducible tar.gz:
            # - stable ordering (--sort=name)
            # - stable timestamps (--mtime, via SOURCE_DATE_EPOCH)
            # - stable ownership metadata (--owner/--group)
            # - gzip without embedding mtime (gzip -n)
            tar --sort=name --mtime="@${SOURCE_DATE_EPOCH}" --owner=0 --group=0 --numeric-owner \
              -C "${outdir}" -cf - . | gzip -n > "${tarball}"
          done

      - name: Download syft
        id: syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          syft-version: v1.41.2

      - name: Generate SBOMs (SPDX + CycloneDX)
        run: |
          set -euo pipefail
          syft="${{ steps.syft.outputs.cmd }}"
          tag="${{ github.ref_name }}"
          for tool in torque verifier verify torque-package; do
            bin="dist/${tool}-${{ matrix.os }}-${{ matrix.arch }}-${tag}/${tool}"
            spdx="dist/${tool}-${{ matrix.os }}-${{ matrix.arch }}-${tag}.sbom.spdx.json"
            cdx="dist/${tool}-${{ matrix.os }}-${{ matrix.arch }}-${tag}.sbom.cdx.json"
            "${syft}" "file:${bin}" -o "spdx-json=${spdx}" -o "cyclonedx-json=${cdx}"
          done

      - name: Generate checksums
        run: |
          set -euo pipefail
          checksum_file="checksums-${{ matrix.os }}-${{ matrix.arch }}-${{ github.ref_name }}.txt"
          (
            cd dist
            for f in *.tar.gz *.sbom.*.json; do
              sha256sum "$f" > "$f.sha256"
            done
            ls -1 *.sha256 | LC_ALL=C sort | xargs cat > "${checksum_file}"
          )

      - name: Sign artifacts (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          checksum_file="dist/checksums-${{ matrix.os }}-${{ matrix.arch }}-${{ github.ref_name }}.txt"
          subjects=(dist/*.tar.gz dist/*.sbom.spdx.json dist/*.sbom.cdx.json "${checksum_file}")
          for f in "${subjects[@]}"; do
            # Use a bundle so verification doesn't depend on fetching the cert/rekor entry later.
            cosign sign-blob --yes --bundle "$f.sigstore.json" "$f"
          done

      - name: Verify cosign bundles
        run: |
          set -euo pipefail
          issuer="https://token.actions.githubusercontent.com"
          identity_re="^https://github.com/${{ github.repository }}/.github/workflows/release\\.yml@refs/tags/${{ github.ref_name }}$"
          checksum_file="dist/checksums-${{ matrix.os }}-${{ matrix.arch }}-${{ github.ref_name }}.txt"
          subjects=(dist/*.tar.gz dist/*.sbom.spdx.json dist/*.sbom.cdx.json "${checksum_file}")
          for f in "${subjects[@]}"; do
            cosign verify-blob \
              --bundle "${f}.sigstore.json" \
              --certificate-identity-regexp "${identity_re}" \
              --certificate-oidc-issuer "${issuer}" \
              "${f}" >/dev/null
          done

      - name: Attest build provenance
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        continue-on-error: true
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.sbom.*.json
            dist/*.sha256
            dist/checksums-*.txt

      - name: Attest SBOM (torque)
        uses: actions/attest-sbom@4651f806c01d8637787e274ac3bdf724ef169f34 # v3
        continue-on-error: true
        with:
          subject-path: dist/torque-${{ matrix.os }}-${{ matrix.arch }}-${{ github.ref_name }}.tar.gz
          sbom-path: dist/torque-${{ matrix.os }}-${{ matrix.arch }}-${{ github.ref_name }}.sbom.spdx.json

      - name: Attest SBOM (verify)
        uses: actions/attest-sbom@4651f806c01d8637787e274ac3bdf724ef169f34 # v3
        continue-on-error: true
        with:
          subject-path: dist/verify-${{ matrix.os }}-${{ matrix.arch }}-${{ github.ref_name }}.tar.gz
          sbom-path: dist/verify-${{ matrix.os }}-${{ matrix.arch }}-${{ github.ref_name }}.sbom.spdx.json

      - name: Attest SBOM (verifier)
        uses: actions/attest-sbom@4651f806c01d8637787e274ac3bdf724ef169f34 # v3
        continue-on-error: true
        with:
          subject-path: dist/verifier-${{ matrix.os }}-${{ matrix.arch }}-${{ github.ref_name }}.tar.gz
          sbom-path: dist/verifier-${{ matrix.os }}-${{ matrix.arch }}-${{ github.ref_name }}.sbom.spdx.json

      - name: Attest SBOM (torque-package)
        uses: actions/attest-sbom@4651f806c01d8637787e274ac3bdf724ef169f34 # v3
        continue-on-error: true
        with:
          subject-path: dist/torque-package-${{ matrix.os }}-${{ matrix.arch }}-${{ github.ref_name }}.tar.gz
          sbom-path: dist/torque-package-${{ matrix.os }}-${{ matrix.arch }}-${{ github.ref_name }}.sbom.spdx.json

      - name: Upload release assets
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            dist/*.tar.gz
            dist/*.sbom.spdx.json
            dist/*.sbom.cdx.json
            dist/*.sha256
            dist/checksums-*.txt
            dist/*.sigstore.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  package-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install cosign
        uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0

      - name: Build .deb/.rpm packages
        run: |
          set -euo pipefail
          tag="${{ github.ref_name }}"
          source_date_epoch="$(git show -s --format=%ct HEAD)"
          build_date="$(date -u -d "@${source_date_epoch}" '+%Y-%m-%dT%H:%M:%SZ')"
          make package VERSION="${tag}" BUILD_DATE="${build_date}" PACKAGE_PLATFORMS="linux/amd64"

      - name: Download syft
        id: syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          syft-version: v1.41.2

      - name: Generate SBOMs for packages (SPDX + CycloneDX)
        run: |
          set -euo pipefail
          syft="${{ steps.syft.outputs.cmd }}"
          for pkg in dist/*.deb dist/*.rpm; do
            base="$(basename "${pkg}")"
            "${syft}" "file:${pkg}" -o "spdx-json=dist/${base}.sbom.spdx.json" -o "cyclonedx-json=dist/${base}.sbom.cdx.json"
          done

      - name: Generate checksums (packages)
        run: |
          set -euo pipefail
          checksum_file="checksums-linux-packages-${{ github.ref_name }}.txt"
          (
            cd dist
            for f in *.deb *.rpm *.sbom.*.json; do
              sha256sum "$f" > "$f.sha256"
            done
            ls -1 *.sha256 | LC_ALL=C sort | xargs cat > "${checksum_file}"
          )

      - name: Sign packages (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          checksum_file="dist/checksums-linux-packages-${{ github.ref_name }}.txt"
          subjects=(dist/*.deb dist/*.rpm dist/*.sbom.spdx.json dist/*.sbom.cdx.json "${checksum_file}")
          for f in "${subjects[@]}"; do
            cosign sign-blob --yes --bundle "$f.sigstore.json" "$f"
          done

      - name: Verify cosign bundles (packages)
        run: |
          set -euo pipefail
          issuer="https://token.actions.githubusercontent.com"
          identity_re="^https://github.com/${{ github.repository }}/.github/workflows/release\\.yml@refs/tags/${{ github.ref_name }}$"
          checksum_file="dist/checksums-linux-packages-${{ github.ref_name }}.txt"
          subjects=(dist/*.deb dist/*.rpm dist/*.sbom.spdx.json dist/*.sbom.cdx.json "${checksum_file}")
          for f in "${subjects[@]}"; do
            cosign verify-blob \
              --bundle "${f}.sigstore.json" \
              --certificate-identity-regexp "${identity_re}" \
              --certificate-oidc-issuer "${issuer}" \
              "${f}" >/dev/null
          done

      - name: Attest build provenance (packages)
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        continue-on-error: true
        with:
          subject-path: |
            dist/*.deb
            dist/*.rpm
            dist/*.sbom.*.json
            dist/*.sha256
            dist/checksums-linux-packages-*.txt

      - name: Attest SBOM (deb)
        uses: actions/attest-sbom@4651f806c01d8637787e274ac3bdf724ef169f34 # v3
        continue-on-error: true
        with:
          subject-path: dist/torque_${{ github.ref_name }}_amd64.deb
          sbom-path: dist/torque_${{ github.ref_name }}_amd64.deb.sbom.spdx.json

      - name: Attest SBOM (rpm)
        uses: actions/attest-sbom@4651f806c01d8637787e274ac3bdf724ef169f34 # v3
        continue-on-error: true
        with:
          subject-path: dist/torque-${{ github.ref_name }}-1.x86_64.rpm
          sbom-path: dist/torque-${{ github.ref_name }}-1.x86_64.rpm.sbom.spdx.json

      - name: Upload package assets
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            dist/*.deb
            dist/*.rpm
            dist/*.sbom.spdx.json
            dist/*.sbom.cdx.json
            dist/*.sha256
            dist/checksums-linux-packages-*.txt
            dist/*.sigstore.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
