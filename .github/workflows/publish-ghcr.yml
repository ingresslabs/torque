name: Publish GHCR image

on:
  # Disabled by default to avoid automatically creating GHCR package versions.
  # Run manually when publishing container images is desired.
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25.9'
          cache: true

      - name: Build linux binaries (amd64/arm64)
        run: |
          set -euo pipefail
          mkdir -p docker/bin

          commit="$(git rev-parse --short=12 HEAD)"
          source_date_epoch="$(git show -s --format=%ct HEAD)"
          build_date="$(date -u -d "@${source_date_epoch}" '+%Y-%m-%dT%H:%M:%SZ')"

          ldflags="-s -w \
            -X github.com/ingresslabs/torque/internal/version.Version=${{ github.ref_name }} \
            -X github.com/ingresslabs/torque/internal/version.GitCommit=${commit} \
            -X github.com/ingresslabs/torque/internal/version.GitTreeState=clean \
            -X github.com/ingresslabs/torque/internal/version.BuildDate=${build_date}"

          for arch in amd64 arm64; do
            out="docker/bin/torque-linux-${arch}"
            echo ">> building linux/${arch} -> ${out}"
            GOOS=linux GOARCH="${arch}" CGO_ENABLED=0 \
              go build -trimpath -ldflags "${ldflags}" -o "${out}" ./cmd/torque
          done

      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: docker
          file: docker/torque.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Install cosign
        uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da # v3.7.0

      - name: Sign image (keyless)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          image="ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}"
          cosign sign --yes "${image}"

      - name: Verify image signature
        run: |
          set -euo pipefail
          issuer="https://token.actions.githubusercontent.com"
          identity_re="^https://github.com/${{ github.repository }}/.github/workflows/publish-ghcr\\.yml@${{ github.ref }}$"
          image="ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}"
          cosign verify \
            --certificate-identity-regexp "${identity_re}" \
            --certificate-oidc-issuer "${issuer}" \
            "${image}" >/dev/null

      - name: Attest build provenance (registry)
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        continue-on-error: true
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
