<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>kubekattle blog</title>
    <style>
      :root {
        --ink: #0f172a;
        --text: #334155;
        --muted: #64748b;
        --paper: #f4f7fb;
        --panel: rgba(255, 255, 255, 0.88);
        --line: rgba(15, 23, 42, 0.1);
        --line-strong: rgba(50, 108, 229, 0.22);
        --accent: #326ce5;
        --accent-soft: #eaf1ff;
      }

      * { box-sizing: border-box; }

      html,
      body {
        margin: 0;
        padding: 0;
        background: linear-gradient(180deg, #eef2f8 0%, var(--paper) 42%, #ffffff 100%);
        color: var(--text);
      }

      body {
        font-family: "Avenir Next", "Avenir", "Helvetica Neue", Helvetica, Arial, sans-serif;
        line-height: 1.65;
        letter-spacing: 0;
      }

      a {
        color: var(--accent);
        text-decoration: none;
      }

      a:hover {
        color: #1d4ed8;
      }

      .frame {
        max-width: 1040px;
        margin: 0 auto;
        padding: 46px 24px 90px;
      }

      .article {
        background: transparent;
        border: 0;
        border-radius: 0;
        box-shadow: none;
        overflow: hidden;
      }

      .hero {
        position: relative;
        padding: 42px 48px 34px;
        border-bottom: 1px solid var(--line);
        background: transparent;
      }

      h1 {
        margin: 0;
        color: var(--ink);
        font-family: "Avenir Next", "Avenir", "Helvetica Neue", Helvetica, Arial, sans-serif;
        font-weight: 760;
        font-size: clamp(2rem, 5vw, 3.25rem);
        line-height: 1.14;
        letter-spacing: 0;
        max-width: 18ch;
        text-wrap: balance;
      }

      .deck {
        margin: 14px 0 0;
        max-width: 54ch;
        color: var(--muted);
        font-size: 1rem;
      }

      .content {
        padding: 30px 48px 44px;
      }

      .post-list {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        gap: 14px;
      }

      .post {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 18px 20px;
        box-shadow: 0 10px 28px rgba(15, 23, 42, 0.06);
      }

      .post-title {
        margin: 0;
        font-family: "Avenir Next", "Avenir", "Helvetica Neue", Helvetica, Arial, sans-serif;
        font-size: 1.35rem;
        line-height: 1.3;
        color: var(--ink);
      }

      .post-meta {
        display: none;
      }

      @media (max-width: 760px) {
        .hero,
        .content {
          padding: 24px 20px;
        }
      }
    </style>
    <link rel="stylesheet" href="./blog.css" />
  </head>
  <body>
    <main class="frame">
      <article class="article">
        <section class="content">
          <ul class="post-list">
            <li class="post">
              <h2 class="post-title">
                <a href="./ktl-logs-rollout-aware-debugging.html">ktl logs: Rollout-Aware Debugging Beyond kubectl logs</a>
              </h2>
            </li>
            <li class="post">
              <h2 class="post-title">
                <a href="./ktl-stack-concurrency-plan-visualize.html">ktl: Blazing-Fast Deploys</a>
              </h2>
            </li>
            <li class="post">
              <h2 class="post-title">
                <a href="./ktl-build-safe-builds.html">Build Docker Images Safely with ktl build</a>
              </h2>
            </li>
            <li class="post">
              <h2 class="post-title">
                <a href="./ktl-stack-dag-vs-argo.html">ktl stack DAG Workflows: Where It Beats Argo and Helmfile</a>
              </h2>
            </li>
          </ul>
        </section>
      </article>
    </main>
  </body>
</html>
